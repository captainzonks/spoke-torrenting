# ==============================================================================
# TORRENTING MODULE - TRAEFIK ROUTERS
# ==============================================================================
# Description: Traefik dynamic router definitions for the torrenting module
# Author: Matt Barham
# Created: 2026-02-13
# Modified: 2026-04-21
# Version: 1.0.1
# Host: Your Server
# ==============================================================================
# Type: Traefik Dynamic Config (routers)
# Component: module: torrenting
# ==============================================================================

http:
  routers:
    qbittorrent-static-assets:
      rule: Host(`q.{{ env "DOMAIN" }}`) && (PathPrefix(`/images/`) || PathPrefix(`/fonts/`) || PathPrefix(`/views/`) || PathPrefix(`/css/`) || PathPrefix(`/scripts/`))
      entryPoints: "websecure"
      priority: 200
      middlewares: chain-static-assets@file
      service: qbittorrent-svc@file

    qbittorrent:
      rule: Host(`q.{{ env "DOMAIN" }}`)
      entryPoints: "websecure"
      middlewares: chain-authentik-no-crowdsec@file
      service: qbittorrent-svc@file

    slskd:
      rule: Host(`soul.{{ env "DOMAIN" }}`)
      entryPoints: "websecure"
      middlewares: chain-slskd@file
      service: slskd-svc@file
