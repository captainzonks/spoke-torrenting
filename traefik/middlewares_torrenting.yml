# ==============================================================================
# TORRENTING MODULE - TRAEFIK MIDDLEWARES
# ==============================================================================
# Description: Traefik dynamic middleware definitions for the torrenting module
# Author: Matt Barham
# Created: 2026-02-13
# Modified: 2026-04-21
# Version: 1.0.1
# Host: Your Server
# ==============================================================================
# Type: Traefik Dynamic Config (middlewares)
# Component: module: torrenting
# ==============================================================================

http:
  middlewares:
    #======================================================
    # SLSKD RATE LIMITING
    #
    # No period = 1s window (Traefik default).
    # Bulk operations (e.g. "clear all complete downloads")
    # fire one request per item concurrently. With dozens or
    # hundreds of completed downloads this blows past the
    # default burst of 50 on rate-limit.
    #======================================================

    rate-limit-slskd:
      rateLimit:
        average: 200
        burst: 300

    #======================================================
    # SLSKD CHAIN
    # Retains CrowdSec — slskd is public-facing with its
    # own built-in authentication (no Authentik needed).
    #======================================================

    chain-slskd:
      chain:
        middlewares:
          - rate-limit-slskd
          - secure-headers@file
          - real-ip@file
          - crowdsec@file
