# ==============================================================================
# SPOKE-TORRENTING - DOCKER COMPOSE
# ==============================================================================
# Description: VPN-protected torrenting and direct download stack
# Version: 1.0.4
# Created: 2026-02-13
# Modified: 2026-04-20
# ==============================================================================
# Module: torrenting
# Config Sources: .env (hub vars injected by Spoke + module defaults)
# Security: VPN killswitch via gluetun, non-root where possible
# ==============================================================================
# Container Images:
#   GLUETUN_IMAGE (qmcgaw/gluetun:latest)
#   QBITTORRENT_IMAGE (ghcr.io/hotio/qbittorrent:release-5.1.4)
#   QSTICKY_IMAGE (ghcr.io/monstermuffin/qsticky:latest)
#   SLSKD_IMAGE (slskd/slskd:0.25.1)
# Networks:
#   - troxy (192.168.35.0/24) - main application network
# ==============================================================================

name: spoke-torrenting

############################ EXTENSIONS

x-ssl: &ssl
  environment:
    - SSL_CERT_FILE=${SSL_CERT_FILE}
    - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE}
    - CURL_CA_BUNDLE=${CURL_CA_BUNDLE}

  volumes:
    - ${CA_CERT}:/etc/ssl/certs/ca-certificates.crt:ro

x-logging-small: &log_small
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "2"

############################ NETWORKS

networks:
  troxy:
    external: true

############################# SECRETS

secrets:
  proton_vpn_wireguard_private_key:
    file: ${SECRETS_DIR}/torrenting/proton_vpn_wireguard_private_key

############################# SERVICES

services:
  #======================================
  # GLUETUN - VPN Tunnel
  #======================================
  gluetun:
    <<: [*ssl, *log_small]
    image: ${GLUETUN_IMAGE}
    hostname: gluetun
    container_name: gluetun
    restart: on-failure
    init: true

    security_opt:
      - no-new-privileges=true
    mem_limit: 512M
    cpus: 0.75
    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun:rw

    networks:
      troxy:
        ipv4_address: ${GLUETUN_IP}

    ports:
      - ${QBITTORRENT_WEB_UI_PORT}:8080
      - ${GLUETUN_CONTROL_SERVER_PORT}:8000
      - ${SLSKD_HTTP_PORT}:5030
      - ${SLSKD_HTTPS_PORT}:5031
      - ${SLSKD_LISTEN_PORT}:50300

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9999/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - VPN_PORT_FORWARDING=on
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - HTTP_CONTROL_SERVER_LOG=on
      - HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH=/gluetun/auth/config.toml
      - WIREGUARD_PRIVATE_KEY_SECRETFILE=/run/secrets/proton_vpn_wireguard_private_key
      - WIREGUARD_ADDRESSES=10.2.0.2/32
      - SERVER_COUNTRIES=United States

    volumes:
      - ${APPDATA_DIR}/gluetun/:/gluetun/:rw
      - ${APPDATA_DIR}/gluetun/auth/config.toml:/gluetun/auth/config.toml:ro
      - ${LOCALTIME}:/etc/localtime:ro

    tmpfs:
      - /tmp/:rw,size=100m
      - /run/:rw,size=50m

    secrets:
      - proton_vpn_wireguard_private_key

  #======================================
  # QBITTORRENT - Torrent Client (VPN routed)
  #======================================
  qbittorrent:
    <<: [*ssl, *log_small]
    image: ${QBITTORRENT_IMAGE}
    container_name: qbittorrent
    restart: on-failure

    security_opt:
      - no-new-privileges=true
    mem_limit: 4G
    cpus: 2.0

    depends_on:
      gluetun:
        condition: service_healthy

    network_mode: "container:gluetun"

    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1

    healthcheck:
      test: ["CMD-SHELL", "curl -sf https://api.ipify.org || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s

    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${DGID}
      - UMASK=002
      - DOMAIN=${DOMAIN}
      - WEBUI_PORT=8080
      - WEBUI_PORTS=8080
      - QBT_LEGAL_NOTICE=confirm
      - QBT_PREFERENCES__DOWNLOADS_PREALLOCATEALL=true
      - QBT_PREFERENCES__CONNECTION_PORTRANGEMIN=6881
      - QBT_PREFERENCES__CONNECTION_PORTRANGEMAX=6889
      - QBT_PREFERENCES__BITTORRENT_MAXCONNECTIONS=500
      - QBT_PREFERENCES__BITTORRENT_MAXUPLOADS=20
      - QBT_PREFERENCES__DOWNLOADS_SAVEPATH=/downloads/complete/
      - QBT_PREFERENCES__DOWNLOADS_TEMPPATH=/downloads/incomplete/

    volumes:
      - ${APPDATA_DIR}/qbittorrent/:/app/qBittorrent/:rw
      - ${DL_DIR}/:/downloads/:rw
      - ${LOCALTIME}:/etc/localtime:ro

    tmpfs:
      - /dev/shm/:rw,size=512m

  #======================================
  # QSTICKY - VPN Killswitch for qBittorrent
  #======================================
  qsticky:
    <<: [*ssl, *log_small]
    image: ${QSTICKY_IMAGE}
    hostname: qsticky
    container_name: qsticky
    restart: on-failure
    init: true

    security_opt:
      - no-new-privileges=true
    mem_limit: 64M
    cpus: 0.25
    cap_drop:
      - ALL
    user: ${PUID}:${DGID}

    networks:
      troxy:
        ipv4_address: ${QSTICKY_IP}

    depends_on:
      gluetun:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python3", "-c", "import json; exit(0 if json.load(open('/app/health/status.json'))['healthy'] else 1)"]
      start_period: 90s
      interval: 30s
      timeout: 10s
      retries: 5

    environment:
      - TZ=${TZ}
      - QBITTORRENT_HOST=gluetun
      - QBITTORRENT_PORT=8080
      - QBITTORRENT_USER=admin
      - QBITTORRENT_PASS=${QBITTORRENT_PASS}
      - QBITTORRENT_HTTPS=false
      - GLUETUN_HOST=gluetun
      - GLUETUN_PORT=8000
      - GLUETUN_AUTH_TYPE=apikey
      - GLUETUN_APIKEY=${GLUETUN_API_KEY}
      - CHECK_INTERVAL=30
      - LOG_LEVEL=INFO
      - PAUSE_ON_VPN_DISCONNECT=true
      - RESUME_ON_VPN_RECONNECT=true

    volumes:
      - ${LOCALTIME}:/etc/localtime:ro

  #======================================
  # SLSKD - Soulseek Music Sharing (VPN routed)
  #======================================
  slskd:
    <<: [*ssl, *log_small]
    image: ${SLSKD_IMAGE}
    container_name: slskd
    restart: unless-stopped
    init: true

    security_opt:
      - no-new-privileges=true
    mem_limit: 512m
    cpus: 0.5
    user: ${PUID}:${DGID}

    depends_on:
      gluetun:
        condition: service_healthy

    network_mode: "container:gluetun"

    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SHARED_DIR=/music
      - SLSKD_DOWNLOADS_DIR=/complete
      - SLSKD_INCOMPLETE_DIR=/incomplete
      - TINI_SUBREAPER=

    volumes:
      - ${APPDATA_DIR}/slskd/:/app/:rw
      - ${MUSIC_DIR}/:/music/:rw
      - ${DL_DIR}/complete/music/:/complete/:rw
      - ${DL_DIR}/incomplete/music/:/incomplete/:rw

    tmpfs:
      - /tmp/:rw,size=200m
      - /run/:rw,size=50m
